<div class="section-header" id="blog">
  <h2><span>#</span> recent posts</h2>
  <div class="section-line"></div>
</div>

<div class="grid" id="blog-container">
  <div class="card">
    <div class="skeleton skeleton-thumb"></div>
    <div class="skeleton skeleton-line"></div>
    <div class="skeleton skeleton-line short"></div>
  </div>
  <div class="card">
    <div class="skeleton skeleton-thumb"></div>
    <div class="skeleton skeleton-line"></div>
    <div class="skeleton skeleton-line short"></div>
  </div>
  <div class="card">
    <div class="skeleton skeleton-thumb"></div>
    <div class="skeleton skeleton-line"></div>
    <div class="skeleton skeleton-line short"></div>
  </div>
</div>


<script>
const username = "bitwise-rude";
const repo = "bitwise-rude.github.io";

async function loadBlogs() {
  const container = document.getElementById("blog-container");
  try {
    const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/blogs`);
    const folders = await res.json();
    const cards = [];

    for (const folder of folders) {
      if (folder.type !== "dir") continue;
      const configUrl = `https://raw.githubusercontent.com/${username}/${repo}/main/blogs/${folder.name}/config.json`;
      try {
        const configRes = await fetch(configUrl);
        const config = await configRes.json();
        cards.push({ folder: folder.name, config });
      } catch (_) {}
    }
    cards.sort((a, b) => new Date(b.config.date) - new Date(a.config.date));
    container.innerHTML = "";

    if (cards.length === 0) {
      container.innerHTML = '<div class="empty">// aww no posts yet</div>';
      return;
    }

    for (const { folder, config } of cards) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <a href="blogs/${folder}/index.html">
          <img class="card-thumb" src="blogs/${folder}/${config.thumbnail}" alt="${config.title}" loading="lazy">
          <div class="card-title">${config.title}</div>
        </a>
        <div class="card-desc">${config.description}</div>
        <div class="card-date">${config.date}</div>
      `;
      container.appendChild(card);
    }
  } catch (err) {
    container.innerHTML = '<div class="empty">// error&mdash</div>';
    console.error(err);
  }
}

loadBlogs();
</script>
</body>
</html>
